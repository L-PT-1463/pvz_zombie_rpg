<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PvZ: Zombie RPG - Concept</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui">
        <button id="saveRunBtn" style="display:none;">Save</button>
        <button id="exportSaveBtn" style="display:none;">Export</button>
        <button id="importSaveBtn" style="display:none;">Import</button>
        <input id="importSaveFile" type="file" accept="application/json" style="display:none;" />
        <button id="backToAvatar" style="display:none;">Avatar Selection</button>
        <div id="avatarUI">
            <div id="modelSelector">
            <button id="leftArrow" class="arrow">◀</button>

            <div id="modelPreviewBlock">
                <div id="previewFrame"></div>
                <div id="modelName">Browncoat</div>
            </div>

            <button id="rightArrow" class="arrow">▶</button>
            </div>

            <div id="colorSelector">
            <label for="tieColorPicker">Tie Color</label>
            <input type="color" id="tieColorPicker" value="#ff0000">
            </div>

            <button id="confirmAvatar">Continue</button>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
